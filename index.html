<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GOI — TOEIC単語トレーナー</title>
<meta name="description" content="TOEIC 900を目標としたFSRSベースの英単語学習PWA">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2D5DA1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GOI">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" href="./icons/icon-192.png">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div id="app">
  <header>
    <div class="brand">GOI<span>.</span><small>TOEIC 900</small></div>
    <div class="streak" id="streakBadge">🔥 0日</div>
  </header>

  <main>
    <!-- 学習 -->
    <section class="screen active" id="scr-study">
      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
        <div class="prog-num" id="progNum">0 / 0</div>
      </div>
      <div class="mode-switch" id="modeSwitch">
        <button class="mode-btn active" data-m="kinfure">金フレ式</button>
        <button class="mode-btn" data-m="listen">リスニング</button>
        <button class="mode-btn" data-m="card">単語カード</button>
      </div>
      <div id="studyArea"></div>
    </section>

    <!-- 統計 -->
    <section class="screen" id="scr-stats">
      <div class="stat-grid">
        <div class="stat-card"><div class="num" id="stToday">0</div><div class="lbl">今日の学習</div></div>
        <div class="stat-card"><div class="num" id="stAcc">–</div><div class="lbl">今日の正答率</div></div>
        <div class="stat-card"><div class="num" id="stTotal">0</div><div class="lbl">累計レビュー</div></div>
        <div class="stat-card"><div class="num" id="stKnown">0</div><div class="lbl">復習フェーズの語</div></div>
      </div>
      <div class="panel">
        <h3>直近7日のレビュー数</h3>
        <div class="bars" id="weekBars"></div>
      </div>
      <div class="panel">
        <h3>習得状況</h3>
        <div class="state-row" id="stateRow"></div>
        <div class="state-legend">
          <span><span class="dot" style="background:var(--line)"></span>未着手</span>
          <span><span class="dot" style="background:var(--hard)"></span>学習中</span>
          <span><span class="dot" style="background:var(--ok)"></span>復習</span>
        </div>
      </div>
      <div class="panel">
        <h3>学習ヒートマップ(5週)</h3>
        <div class="heat" id="heatGrid"></div>
      </div>
    </section>

    <!-- 単語帳 -->
    <section class="screen" id="scr-list">
      <input class="search" id="searchBox" type="search" placeholder="単語・意味で検索">
      <div id="wordList"></div>
    </section>
  </main>

  <nav>
    <button class="tab active" data-scr="study"><span class="ico">📖</span><small>学習</small></button>
    <button class="tab" data-scr="stats"><span class="ico">📊</span><small>統計</small></button>
    <button class="tab" data-scr="list"><span class="ico">🗂️</span><small>単語帳</small></button>
  </nav>
</div>

<script src="./js/fsrs.js"></script>
<script src="./js/db.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
